name: publish-debug

# One-off helper: copy an already-built Windows artifact from a release.yml run
# onto the `debug-master` pre-release, entirely on a GitHub runner (artifact ->
# release transfer stays inside GitHub's network -- avoids flaky local CDN
# downloads). Push-triggered (not workflow_dispatch) so it runs from this branch
# without needing to live on the default branch; the paths filter makes it fire
# only when this file itself is pushed. Edit RUN_ID below and push to publish.

on:
  push:
    branches: [debug-build-master]
    paths: ['.github/workflows/publish-debug.yml']

permissions:
  contents: write

env:
  RUN_ID: "26370361771"
  ASSET_NAME: "ja2-sdl3-windows-debug-master-1.zip"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact + attach to debug-master prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eux
          gh run download "$RUN_ID" -n ja2-sdl3-windows -R "${{ github.repository }}" -D dl
          mv dl/*.zip "$ASSET_NAME"
          gh release upload debug-master "$ASSET_NAME" --clobber -R "${{ github.repository }}"
