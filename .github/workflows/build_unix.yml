name: build

# CMake/SDL3 compile-check on every platform we ship -- Linux (x64 +
# arm64), macOS, Windows. English only for now (multi-language builds
# come later).
# Optimized Release builds (NDEBUG, asserts off, no debug symbols).
#
# The three shipped applications -- the main game (JA2_ENGLISH),
# Unfinished Business (JA2UB_ENGLISH) and the map editor
# (JA2MAPEDITOR_ENGLISH) -- each build in their own job, so the matrix
# is the cross product of {application} x {platform} = 12 parallel jobs.
# Each job re-builds the shared deps (SDL3, expat, lua, zlib, ...), but
# running in parallel keeps wall-clock time down to a single variant
# and isolates a failure to the exact application that broke.
#
# This replaces the legacy MSBuild Windows pipeline (build.yml, now
# manual-dispatch only) for the SDL3 port. Every platform drives the
# same CMake/Ninja/clang build; on Windows we use clang's GCC-compat
# driver through the LLVM toolchain that ships with Visual Studio 2022
# on the windows-latest runner image.

on:
  workflow_call:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  compile:
    name: ${{ matrix.application }} (${{ matrix.platform.name }})
    strategy:
      fail-fast: false
      matrix:
        application: [JA2, JA2UB, JA2MAPEDITOR]
        platform:
          - { os: ubuntu-latest,    name: linux }
          - { os: ubuntu-24.04-arm, name: linux-arm64 }
          - { os: macos-latest,     name: macos }
          - { os: windows-latest,   name: windows }
    runs-on: ${{ matrix.platform.os }}

    # sccache caches compiled object files (SDL3, SDL3_mixer, opus, expat,
    # lua, AND the engine) keyed by content + compiler + flags. After the
    # first run populates it, unchanged deps (the bulk of the ~20min build)
    # are cache hits, so jobs only recompile what actually changed.
    #
    # We persist sccache's LOCAL disk cache via first-party actions/cache
    # rather than sccache's own GitHub Actions backend -- the latter still
    # targets the retired v1 cache API (artifactcache.actions.githubusercontent.com)
    # and hard-fails the compile when it can't reach it.
    env:
      SCCACHE_DIR: ${{ github.workspace }}/.sccache

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Cache sccache storage
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-${{ matrix.platform.name }}-${{ matrix.application }}-${{ github.run_id }}
          restore-keys: |
            sccache-${{ matrix.platform.name }}-

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Install Linux build deps
        if: startsWith(matrix.platform.name, 'linux')
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang cmake ninja-build pkg-config \
            libwayland-dev wayland-protocols libdecor-0-dev \
            libx11-dev libxext-dev libxcursor-dev libxi-dev \
            libxinerama-dev libxrandr-dev libxss-dev libxkbcommon-dev \
            libxtst-dev libxfixes-dev \
            libgl1-mesa-dev libegl1-mesa-dev \
            libasound2-dev libpulse-dev libdbus-1-dev libudev-dev \
            libibus-1.0-dev
          # SDL3's CMakeLists unconditionally appends '-Wno-error=
          # address-of-temporary' which is a Clang-specific warning
          # name; GCC bails on the unknown flag. Use clang to match the
          # macOS toolchain (Apple Clang) and sidestep this entirely.
          echo "CC=clang"   >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV

      - name: Install macOS build deps
        if: matrix.platform.name == 'macos'
        run: |
          set -eux
          brew install cmake ninja
          # Everything else SDL3 needs (Cocoa, Metal, CoreAudio, ...)
          # ships with Xcode Command Line Tools, which is pre-installed
          # on github runners.

      - name: Set up MSVC environment (Windows)
        if: matrix.platform.name == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Select clang toolchain (Windows)
        if: matrix.platform.name == 'windows'
        shell: bash
        run: |
          # Use clang's GCC-compat driver (not clang-cl) targeting
          # the MSVC ABI. clang-cl reports CMAKE_C_SIMULATE_ID=MSVC,
          # which makes opus's CMake skip its GNU-style `-msse4.1`
          # flag and the SSE4.1 intrinsics fail to compile. The GCC
          # driver gets the right per-source feature flags added by
          # opus and friends, while `--target=x86_64-pc-windows-msvc`
          # keeps us linking against the standard MSVC runtime.
          echo "CC=clang"                                  >> $GITHUB_ENV
          echo "CXX=clang++"                               >> $GITHUB_ENV
          echo "CFLAGS=--target=x86_64-pc-windows-msvc"    >> $GITHUB_ENV
          echo "CXXFLAGS=--target=x86_64-pc-windows-msvc"  >> $GITHUB_ENV

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DLanguages=ENGLISH -DApplications=${{ matrix.application }} -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build build

      - name: sccache stats
        if: always()
        run: sccache --show-stats

      - name: List build artifacts (unix)
        if: matrix.platform.name != 'windows'
        run: |
          set -eux
          ls -la build/
          find build/ -maxdepth 2 -type f \( -name 'JA2*' -o -name 'ja2*' \) | head -20

      - name: List build artifacts (Windows)
        if: matrix.platform.name == 'windows'
        shell: pwsh
        run: |
          Get-ChildItem build/ | Format-Table -AutoSize
          Get-ChildItem -Recurse build/ -Filter '${{ matrix.application }}_ENGLISH*' | Format-Table FullName

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.application }}-${{ matrix.platform.name }}
          path: |
            build/${{ matrix.application }}_ENGLISH
            build/${{ matrix.application }}_ENGLISH.exe
            build/*.dll
          if-no-files-found: warn
